          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: classification
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of contractors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contractor"
    post:
      operationId: createContractor
      tags: [contractors]
      summary: Create a new contractor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContractorBody"
      responses:
        "201":
          description: Created contractor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contractor"

  /contractors/{id}:
    get:
      operationId: getContractor
      tags: [contractors]
      summary: Get a contractor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contractor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contractor"
    patch:
      operationId: updateContractor
      tags: [contractors]
      summary: Update a contractor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContractorBody"
      responses:
        "200":
          description: Updated contractor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contractor"
    delete:
      operationId: deleteContractor
      tags: [contractors]
      summary: Delete a contractor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contractors/{id}/blacklist:
    patch:
      operationId: toggleContractorBlacklist
      tags: [contractors]
      summary: Toggle contractor blacklist status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blacklisted]
              properties:
                blacklisted:
                  type: boolean
                reason:
                  type: ["string", "null"]
      responses:
        "200":
          description: Updated contractor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contractor"

  /contractors/stats:
    get:
      operationId: getContractorStats
      tags: [contractors]
      summary: Contractor statistics summary
      responses:
        "200":
          description: Contractor stats
          content:
