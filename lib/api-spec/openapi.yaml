          format: date
        lastMaintenanceDate:
          type: [string, 'null']
          format: date
        nextMaintenanceDate:
          type: [string, 'null']
          format: date
        notes:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    CreateEquipmentBody:
      type: object
