  # ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      parameters:
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

  # ─── DASHBOARD ────────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Executive dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent system activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/attendance-trend:
    get:
      operationId: getAttendanceTrend
      tags: [dashboard]
      summary: Attendance trend for the last 7 days
      responses:
        "200":
          description: Attendance trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendDataPoint"

  /dashboard/contractor-performance:
    get:
      operationId: getContractorPerformance
      tags: [dashboard]
      summary: Contractor performance overview
      responses:
        "200":
          description: Contractor performance data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractorPerformance"

  # ─── REPORTS ──────────────────────────────────────────────────────────────────
  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List saved reports
      responses:
        "200":
          description: Reports list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: createReport
      tags: [reports]
      summary: Create/save a report definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportBody"
      responses:
        "201":
          description: Created report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  # ─── AUDIT LOGS ───────────────────────────────────────────────────────────────
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [auditLogs]
      summary: List audit log entries
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Auth Schemas ────────────────────────────────────────────────────────────
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
          format: uri
        state:
          type: string
        nonce:
          type: string
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── User Schemas ────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, replitId, email, firstName, lastName, role, status, createdAt]
      properties:
        id:
          type: integer
        replitId:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          type: string
          enum: [super_admin, company_admin, project_manager, supervisor, contractor, employee, viewer]
        department:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        status:
          type: string
          enum: [active, inactive, suspended]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: [string, 'null']
          format: date-time
    CreateUserBody:
      type: object
      required: [email, firstName, lastName, role]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        department:
          type: string
        phone:
          type: string
    UpdateUserBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        department:
          type: string
        phone:
          type: string
        status:
          type: string

    # ── Contractor Schemas ──────────────────────────────────────────────────────
    Contractor:
      type: object
      required: [id, name, companyName, status, classification, blacklisted, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: string
        email:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        nationalId:
          type: [string, 'null']
        taxNumber:
          type: [string, 'null']
        classification:
          type: string
          enum: [tier1, tier2, tier3, preferred, blacklisted]
        status:
          type: string
          enum: [active, pending, suspended, expired]
        blacklisted:
          type: boolean
        blacklistReason:
          type: [string, 'null']
        performanceScore:
          type: ["number", "null"]
        address:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: [string, 'null']
          format: date-time
    CreateContractorBody:
      type: object
      required: [name, companyName, classification]
      properties:
        name:
          type: string
        companyName:
          type: string
        email:
          type: string
        phone:
          type: string
        nationalId:
          type: string
        taxNumber:
          type: string
        classification:
          type: string
        address:
          type: string
    UpdateContractorBody:
      type: object
      properties:
        name:
          type: string
        companyName:
          type: string
        email:
          type: string
        phone:
          type: string
        classification:
          type: string
        status:
          type: string
        address:
          type: string
    ContractorStats:
      type: object
      required: [total, active, pending, blacklisted, byClassification]
      properties:
        total:
          type: integer
        active:
          type: integer
        pending:
          type: integer
        blacklisted:
          type: integer
        byClassification:
          type: array
          items:
            type: object
            required: [classification, count]
            properties:
              classification:
                type: string
              count:
                type: integer

    # ── Contract Schemas ────────────────────────────────────────────────────────
    Contract:
      type: object
      required: [id, title, contractorId, status, startDate, endDate, value, createdAt]
      properties:
