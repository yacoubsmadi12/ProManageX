          type: integer
        late:
          type: integer
        onLeave:
          type: integer
        total:
          type: integer
        attendanceRate:
          type: number
    AttendanceStats:
      type: object
      required: [presentRate, absentRate, lateRate, overtimeHours, trend]
      properties:
        presentRate:
          type: number
        absentRate:
          type: number
        lateRate:
          type: number
        overtimeHours:
          type: number
        trend:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"

    # ── Evaluation Schemas ──────────────────────────────────────────────────────
    Evaluation:
      type: object
      required: [id, userId, period, overallScore, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: [string, 'null']
        evaluatorId:
          type: ["integer", "null"]
        period:
          type: string
        kpiScore:
          type: ["number", "null"]
        attendanceScore:
          type: ["number", "null"]
        qualityScore:
          type: ["number", "null"]
        punctualityScore:
          type: ["number", "null"]
        overallScore:
          type: number
        status:
          type: string
          enum: [draft, submitted, approved]
        comments:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    CreateEvaluationBody:
      type: object
      required: [userId, period, overallScore]
      properties:
        userId:
          type: integer
        period:
          type: string
        kpiScore:
          type: number
        attendanceScore:
