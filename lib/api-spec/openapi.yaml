      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: [string, 'null']
        workAreaId:
          type: ["integer", "null"]
        workAreaName:
          type: [string, 'null']
        date:
          type: string
          format: date
        checkIn:
          type: [string, 'null']
          format: date-time
        checkOut:
          type: [string, 'null']
          format: date-time
        status:
          type: string
          enum: [present, absent, late, half_day, leave]
        overtimeHours:
          type: ["number", "null"]
        notes:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    CreateAttendanceBody:
      type: object
      required: [userId, date, status]
      properties:
        userId:
          type: integer
        workAreaId:
          type: integer
        date:
          type: string
          format: date
        checkIn:
          type: string
          format: date-time
        checkOut:
          type: string
          format: date-time
        status:
