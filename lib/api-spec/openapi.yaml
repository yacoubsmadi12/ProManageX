      operationId: listViolations
      tags: [violations]
      summary: List violations
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of violations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Violation"
    post:
      operationId: createViolation
      tags: [violations]
      summary: Register a violation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateViolationBody"
      responses:
        "201":
          description: Created violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Violation"

  /violations/{id}:
