          enum: [safety, attendance, conduct, quality, policy]
        severity:
          type: string
          enum: [minor, moderate, major, critical]
        status:
          type: string
          enum: [open, under_review, resolved, escalated]
        date:
          type: string
          format: date
        description:
          type: string
        penalty:
          type: ["number", "null"]
        evidenceUrl:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    CreateViolationBody:
      type: object
      required: [userId, category, severity, date, description]
      properties:
        userId:
          type: integer
        category:
          type: string
