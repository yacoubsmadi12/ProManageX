          type: [string, 'null']
        status:
          type: string
          enum: [draft, active, expired, renewed, terminated]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        value:
          type: number
        paidAmount:
          type: ["number", "null"]
        description:
          type: [string, 'null']
        fileUrl:
          type: [string, 'null']
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: [string, 'null']
          format: date-time
    CreateContractBody:
      type: object
      required: [title, contractorId, startDate, endDate, value]
      properties:
        title:
          type: string
        contractorId:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        value:
          type: number
        description:
          type: string
    UpdateContractBody:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
        endDate:
          type: string
          format: date
        value:
          type: number
        paidAmount:
          type: number
        description:
          type: string
    ContractStats:
      type: object
